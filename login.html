<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - P.S. It's A Vibe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">P.S. It's A Vibe</div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="login.html" class="active">Login</a>
        <a href="cart.html" class="cart-link">Cart <span id="cart-count" class="cart-badge hidden">0</span></a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <h1>Customer Login</h1>
      <p class="muted">Sign in to save your account for future orders. Checkout uses Stripe Checkout Sessions.</p>
    </section>

    <section class="panel admin-two-col">
      <form id="login-form" class="checkout-form">
        <h3>Sign In</h3>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="button">Sign In</button>
      </form>

      <form id="register-form" class="checkout-form">
        <h3>Create Account</h3>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password (6+ chars)" minlength="6" required>
        <button type="submit" class="button secondary">Create Account</button>
      </form>
    </section>

    <section class="panel checkout-form" style="margin-top: 2rem;">
      <h3>Guest Checkout</h3>
      <p class="muted">No account needed. Fill in your information and proceed to checkout.</p>
      <form id="guest-checkout-form" class="checkout-form">
        <div class="form-row">
          <input type="text" name="firstName" placeholder="First Name" required>
          <input type="text" name="lastName" placeholder="Last Name" required>
        </div>
        <input type="email" name="email" placeholder="Email" required>
        <input type="tel" name="phone" placeholder="Phone Number" required>
        <div class="form-row">
          <input type="text" name="address" placeholder="Street Address" required>
          <input type="text" name="apartment" placeholder="Apt, suite, etc. (optional)">
        </div>
        <div class="form-row">
          <input type="text" name="city" placeholder="City" required>
          <input type="text" name="state" placeholder="State/Province" maxlength="2" required>
          <input type="text" name="zip" placeholder="ZIP/Postal Code" required>
        </div>
        <input type="text" name="country" placeholder="Country" value="US" required>
        <button type="button" id="guest-continue-btn" class="button">Continue to Checkout</button>
      </form>
    </section>

    <p id="auth-message" class="muted"></p>
  </main>

  <footer class="site-footer">© P.S. It's A Vibe</footer>
  <script type="module" src="nav-cart.js"></script>
  <script type="module" src="login.js"></script>
</body>
</html>
