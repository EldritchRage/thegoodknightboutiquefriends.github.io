<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - P.S.It's A Vibe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">P.S.It's A Vibe</div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="shop.html" class="active">Shop</a>
        <a href="login.html">Login</a>
        <a href="buy.html">Cart</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <h1>What's your vibe?</h1>
      <p class="muted">Choose a category to open a specific catalog. Click item details to expand each description.</p>
    </section>

    <section class="shop-layout">
      <aside class="panel category-tree">
        <h3>Shop Categories</h3>

        <button class="category-button" data-category="fun-t-shirts">Fun T Shirts</button>
        <button class="category-button" data-category="cups">Cups</button>
        <button class="category-button" data-category="freshies">Freshies</button>

        <details>
          <summary>Loaded Teas</summary>
          <button class="category-button" data-category="mini-caffeine">Mini Caffeine</button>
          <button class="category-button" data-category="mini-uncaffeinated">Mini Uncaffeinated</button>
          <button class="category-button" data-category="full-sized-caffeine">Full Sized Caffeine</button>
        </details>

        <details>
          <summary>Personal Care</summary>
          <button class="category-button" data-category="body-butter">Body Butter</button>
          <button class="category-button" data-category="hair-detangler">Hair Detangler</button>
          <button class="category-button" data-category="lotion">Lotion</button>
          <button class="category-button" data-category="hand-sanitizer">Hand Sanitizer</button>
          <button class="category-button" data-category="all-purpose-cleaner">All Purpose Cleaner</button>
        </details>

        <button class="category-button" data-category="ravewear">RaveWear</button>
        <button class="category-button" data-category="handmade-jewelry">Handmade Jewelry</button>
        <button class="category-button" data-category="orion-falls-merch">Orion Falls Merch</button>
        <button class="category-button" data-category="customs">Customs</button>
      </aside>

      <section class="panel">
        <h3 id="catalog-title">Category Catalog</h3>
        <div id="catalog-grid" class="catalog-grid"></div>
      </section>
    </section>

  </main>

  <footer class="site-footer">© P.S. It's A Vibe</footer>
  <script type="module" src="shop.js"></script>
</body>
</html>
